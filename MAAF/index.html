<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maafin Aku Ya... 🥺</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background-color: #ffe6ea; /* Warna pink pastel */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        text-align: center;
      }

      /* Kotak Putih Utama */
      .container {
        background-color: white;
        /* Padding atas dikurangi supaya tidak ada jarak kosong jauh */
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        max-width: 90%;
        width: 380px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .hidden {
        display: none !important;
      }

      /* Gaya untuk bingkai Foto Personal */
      .personal-photo {
        width: 160px;
        height: 160px;
        object-fit: cover;
        border-radius: 20px;
        border: 4px solid #ff477e;
        box-shadow: 0 6px 15px rgba(255, 71, 126, 0.2);
        margin-bottom: 20px; /* Jarak pas antara foto dan teks */
        margin-top: 10px; /* Jarak sedikit dari ujung atas kotak putih */
      }

      /* Gaya untuk GIF lucu (hanya dipakai di halaman sukses sekarang) */
      .cute-gif {
        width: 160px;
        border-radius: 15px;
        margin-bottom: 15px;
      }

      h1 {
        font-size: 22px;
        color: #ff477e;
        margin-bottom: 10px;
        line-height: 1.3;
      }

      p {
        font-size: 14px;
        color: #666;
        margin-bottom: 25px;
        line-height: 1.6;
      }

      .buttons {
        display: flex;
        gap: 12px;
        position: relative;
        width: 100%;
        justify-content: center;
      }

      button {
        padding: 12px 20px;
        font-size: 15px;
        font-weight: 600;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition:
          transform 0.2s,
          background-color 0.2s;
        font-family: "Poppins", sans-serif;
        flex: 1;
        max-width: 140px;
      }

      #btn-yes {
        background-color: #ff477e;
        color: white;
        box-shadow: 0 4px 10px rgba(255, 71, 126, 0.3);
      }

      #btn-yes:hover {
        background-color: #ff2a6d;
        transform: scale(1.05);
      }

      #btn-no {
        background-color: #f0f0f0;
        color: #444;
      }
    </style>
  </head>
  <body>
    <div class="container" id="main-container">
      <img
        src="img/p.png"
        alt="Foto Kita"
        class="personal-photo"
        onerror="
          this.src =
            'https://via.placeholder.com/160x160/fff/ff477e?text=Foto+Kamu'
        "
      />

      <h1>Halo vionaa yang canti dan lucuuu, Maafin aku ya? 🥺</h1>

      <p>Aku tahu aku salah, maafin nyakk</p>

      <div class="buttons">
        <button id="btn-yes">Iya, dimaafin</button>
        <button id="btn-no">Nggak mau!</button>
      </div>
    </div>

    <div class="container hidden" id="success-container">
      <img
        src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif"
        alt="Happy Bear"
        class="cute-gif"
      />
      <h1>Yeay! terimaksiiiii! 🥰</h1>
      <p>janjii deh gabakal biki kesel lagii! ❤️</p>
    </div>

    <script>
      const btnNo = document.getElementById("btn-no");
      const btnYes = document.getElementById("btn-yes");
      const mainContainer = document.getElementById("main-container");
      const successContainer = document.getElementById("success-container");

      // Fungsi tombol "Nggak mau" kabur saat disentuh
      btnNo.addEventListener("mouseover", () => {
        const maxX = window.innerWidth - btnNo.offsetWidth - 20;
        const maxY = window.innerHeight - btnNo.offsetHeight - 20;

        const randomX = Math.floor(Math.random() * maxX);
        const randomY = Math.floor(Math.random() * maxY);

        btnNo.style.position = "fixed";
        btnNo.style.left = `${randomX}px`;
        btnNo.style.top = `${randomY}px`;
      });

      // Fungsi saat tombol "Iya" diklik
      btnYes.addEventListener("click", () => {
        mainContainer.classList.add("hidden");
        successContainer.classList.remove("hidden");
      });
    </script>
  </body>
</html>
